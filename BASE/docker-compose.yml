version: "3"
services:
  desktop:
    image: node:latest
    command: sh -c "npm install -g @quasar/cli && npm install && npm run dev"
    environment:
      - NODE_ENV=development
      - PORT=5000
    ports:
      - "5000:5000"
    working_dir: /root/DESKTOP
    volumes:
      - ./DESKTOP:/root/DESKTOP:cached
    restart: always